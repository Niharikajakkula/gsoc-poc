name: API Explorer CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  validate-files:
    name: Validate Project Files
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.9"
      
      - name: Install Python dependencies
        run: pip install pyyaml
      
      - name: Validate OpenAPI JSON files
        working-directory: projects/api-explorer-pipeline
        run: |
          echo "🔍 Validating JSON files..."
          for file in data/*.json; do
            if [ -f "$file" ]; then
              python -m json.tool "$file" > /dev/null && echo "✅ $file"
            fi
          done
      
      - name: Check project structure
        working-directory: projects/api-explorer-pipeline
        run: |
          echo "📁 Checking project structure..."
          [ -d "data" ] && echo "✅ data/ exists"
          [ -d "pipeline" ] && echo "✅ pipeline/ exists"
          [ -d "backend" ] && echo "✅ backend/ exists"
          [ -d "frontend" ] && echo "✅ frontend/ exists"
          [ -d "registry" ] && echo "✅ registry/ exists"
          [ -f "requirements.txt" ] && echo "✅ requirements.txt exists"

  test-pipeline:
    name: Test Python Pipeline
    runs-on: ubuntu-latest
    needs: validate-files
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.9"
      
      - name: Install dependencies
        working-directory: projects/api-explorer-pipeline
        run: pip install -r requirements.txt
      
      - name: Run batch processor
        working-directory: projects/api-explorer-pipeline
        run: python pipeline/batch_processor.py data --clear
      
      - name: Verify registry was created
        working-directory: projects/api-explorer-pipeline
        run: |
          if [ -f "registry/global_index.json" ]; then
            echo "✅ Registry created successfully"
            python -m json.tool registry/global_index.json > /dev/null
          else
            echo "❌ Registry not found"
            exit 1
          fi

  test-backend:
    name: Test Backend Server
    runs-on: ubuntu-latest
    needs: test-pipeline
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.9"
      
      - name: Install Python dependencies
        working-directory: projects/api-explorer-pipeline
        run: pip install -r requirements.txt
      
      - name: Generate test data
        working-directory: projects/api-explorer-pipeline
        run: python pipeline/batch_processor.py data --clear
      
      - name: Install backend dependencies
        working-directory: projects/api-explorer-pipeline/backend
        run: npm install
      
      - name: Start backend server
        working-directory: projects/api-explorer-pipeline/backend
        run: |
          node simple-server.js &
          sleep 5
      
      - name: Test backend health
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3002/)
          if [ "$response" = "200" ]; then
            echo "✅ Backend is healthy"
          else
            echo "❌ Backend health check failed (HTTP $response)"
            exit 1
          fi

  test-frontend:
    name: Test Frontend Files
    runs-on: ubuntu-latest
    needs: validate-files
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
      
      - name: Validate HTML
        working-directory: projects/api-explorer-pipeline
        run: |
          if grep -q "API Explorer" frontend/index.html; then
            echo "✅ HTML is valid"
          else
            echo "❌ HTML validation failed"
            exit 1
          fi
      
      - name: Check JavaScript syntax
        working-directory: projects/api-explorer-pipeline
        run: node -c frontend/script.js
      
      - name: Check CSS exists
        working-directory: projects/api-explorer-pipeline
        run: |
          if [ -f "frontend/style.css" ]; then
            echo "✅ CSS file exists"
          else
            echo "❌ CSS file not found"
            exit 1
          fi

  integration-test:
    name: Integration Test
    runs-on: ubuntu-latest
    needs: [test-pipeline, test-backend, test-frontend]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.9"
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
      
      - name: Install all dependencies
        working-directory: projects/api-explorer-pipeline
        run: |
          pip install -r requirements.txt
          cd backend && npm install
      
      - name: Process APIs
        working-directory: projects/api-explorer-pipeline
        run: python pipeline/batch_processor.py data --clear
      
      - name: Start backend
        working-directory: projects/api-explorer-pipeline
        run: |
          cd backend
          node simple-server.js &
          sleep 10
      
      - name: Test API endpoints
        run: |
          echo "Testing /apis endpoint..."
          curl -f http://localhost:3002/apis > /dev/null
          echo "✅ /apis working"
          
          echo "Testing AI search..."
          curl -f -X POST http://localhost:3002/agent/tools/search \
            -H "Content-Type: application/json" \
            -d '{"query":"get users"}' > /dev/null
          echo "✅ AI search working"

  deploy-demo:
    name: Deploy Demo Artifacts
    runs-on: ubuntu-latest
    needs: integration-test
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.9"
      
      - name: Install Python dependencies
        working-directory: projects/api-explorer-pipeline
        run: pip install -r requirements.txt
      
      - name: Generate demo data
        working-directory: projects/api-explorer-pipeline
        run: python pipeline/batch_processor.py data --clear
      
      - name: Prepare demo artifacts
        working-directory: projects/api-explorer-pipeline
        run: |
          echo "📦 Preparing demo artifacts..."
          mkdir -p ../../demo-artifacts
          cp -r registry ../../demo-artifacts/
          cp -r apis ../../demo-artifacts/
          cp -r api_templates ../../demo-artifacts/
          cp -r frontend ../../demo-artifacts/
          cp -r backend ../../demo-artifacts/
          cp -r data ../../demo-artifacts/
          cp README.md ../../demo-artifacts/
          echo "✅ Demo artifacts prepared"
      
      - name: Archive demo artifacts
        uses: actions/upload-artifact@v4
        with:
          name: api-explorer-demo
          path: demo-artifacts/
          retention-days: 30
      
      - name: Generate artifact summary
        run: |
          echo "## 📦 Demo Artifacts Generated" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "The following artifacts have been generated:" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Registry (processed API data)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ APIs (13 processed APIs)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Templates (curl & PowerShell)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Frontend (HTML/CSS/JS)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Backend (Node.js server)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Data (OpenAPI specifications)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Download from the Actions artifacts section." >> $GITHUB_STEP_SUMMARY
